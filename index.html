<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rage-bait Battle</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: orange;
    }

    #chat {
      background: #1b1b1b;
      border-radius: 10px;
      height: 500px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #dc2626;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: orange;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #score {
      margin-top: 10px;
      font-size: 20px;
      color: gold;
    }

    #rank {
      color: cyan;
    }

    #effect {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      width: min(90vw, 900px);
      font-size: clamp(44px, 9vw, 112px);
      font-weight: 900;
      text-align: center;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 0;
      z-index: 999;
      text-transform: uppercase;
      --shake-distance: 8px;
      --shake-duration: 480ms;
      --explode-duration: 1100ms;
      --glow-color: #f59e0b;
      text-shadow: 0 0 30px var(--glow-color), 0 0 75px var(--glow-color);
    }

    .effect-pulse {
      animation: pulse 0.75s ease-out 1;
    }

    .effect-shake {
      animation: shake var(--shake-duration) ease-in-out 2;
    }

    .effect-flash {
      animation: flash 0.8s ease-in-out 2;
    }

    .effect-explode {
      animation: explode var(--explode-duration) cubic-bezier(0.14, 0.86, 0.24, 1);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(calc(-1 * var(--shake-distance))); }
      75% { transform: translateX(var(--shake-distance)); }
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
        filter: blur(4px);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.22);
        filter: blur(0);
      }
      70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.34);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔥 Rage Bait Battle 🔥</h1>

  <div id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your argument..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div id="score">
    Score: <span id="scoreValue">0</span>
    |
    Rank: <span id="rank">Beginner Menace</span>
  </div>

  <div id="effect"></div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  let score = 0;

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(sender);

    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function updateRank() {
    const rank = document.getElementById("rank");

    if (score < 10000) {
      rank.innerText = "Beginner Menace";
    } else if (score < 50000) {
      rank.innerText = "Certified Troll";
    } else if (score < 150000) {
      rank.innerText = "Keyboard Warrior";
    } else {
      rank.innerText = "Final Boss";
    }
  }

  function updateEffect(currentPoints) {
    const effect = document.getElementById("effect");
    effect.className = "";
    effect.style.color = "#fff";

    const points = Number(currentPoints) || 0;

    if (points === 1000) {
      effect.innerText = "no effects";
      effect.style.setProperty("--glow-color", "#e5e7eb");
      effect.style.setProperty("--shake-distance", "6px");
      effect.style.setProperty("--shake-duration", "520ms");
    } else if (points >= 1001 && points <= 5000) {
      effect.innerText = "critical!";
      effect.classList.add("effect-pulse", "effect-explode");
      effect.style.color = "#f59e0b";
      effect.style.setProperty("--glow-color", "#f59e0b");
      effect.style.setProperty("--shake-distance", "8px");
      effect.style.setProperty("--shake-duration", "460ms");
    } else if (points >= 5001 && points <= 10000) {
      effect.innerText = "Unbelievable!!!";
      effect.classList.add("effect-pulse", "effect-flash", "effect-explode");
      effect.style.color = "#22d3ee";
      effect.style.setProperty("--glow-color", "#22d3ee");
      effect.style.setProperty("--shake-distance", "10px");
      effect.style.setProperty("--shake-duration", "420ms");
    } else if (points >= 10001 && points <= 30000) {
      effect.innerText = "EMOTIONAL DAMAGE!!!";
      effect.classList.add("effect-shake", "effect-explode");
      effect.style.color = "#f97316";
      effect.style.setProperty("--glow-color", "#f97316");
      effect.style.setProperty("--shake-distance", "14px");
      effect.style.setProperty("--shake-duration", "350ms");
    } else if (points >= 30001 && points <= 60000) {
      effect.innerText = "PRO FAILURE MANAGER";
      effect.classList.add("effect-pulse", "effect-shake", "effect-explode");
      effect.style.color = "#a78bfa";
      effect.style.setProperty("--glow-color", "#a78bfa");
      effect.style.setProperty("--shake-distance", "20px");
      effect.style.setProperty("--shake-duration", "300ms");
    } else if (points >= 60001 && points <= 89999) {
      effect.innerText = "PRO RAGE-BAITER";
      effect.classList.add("effect-pulse", "effect-shake", "effect-flash", "effect-explode");
      effect.style.color = "red";
      effect.style.setProperty("--glow-color", "red");
      effect.style.setProperty("--shake-distance", "26px");
      effect.style.setProperty("--shake-duration", "240ms");
    } else if (points >= 90000) {
      effect.innerText = "Undefeatable!!!";
      effect.classList.add("effect-pulse", "effect-shake", "effect-flash", "effect-explode");
      effect.style.color = "#fde047";
      effect.style.setProperty("--glow-color", "#fde047");
      effect.style.setProperty("--shake-distance", "34px");
      effect.style.setProperty("--shake-duration", "180ms");
    } else {
      effect.innerText = "";
    }

    void effect.offsetWidth;
    effect.classList.add("effect-explode");
  }

  async function sendMessage() {
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");

    input.value = "";

    addMessage("AI is typing...", "ai");

    try {
      const response = await fetch("./api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });
      
      const data = await response.json();

      chat.lastChild.remove();

      const aiReply = data.reply || "Imagine losing this hard 💀";
      const gained = Number(data.score) || 1000;

      score = gained;
      document.getElementById("scoreValue").innerText = score;
      updateRank();
      updateEffect(gained);

      addMessage(aiReply, "ai");

    } catch (error) {
      chat.lastChild.remove();

      addMessage(
        "The AI rage quit because your argument was too terrible.",
        "ai"
      );

      console.error(error);
    }
  }

  input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });

  updateEffect(score);
</script>

</body>
</html>
