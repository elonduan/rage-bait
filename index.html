<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rage-bait Battle</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: orange;
    }

    #chat {
      background: #1b1b1b;
      border-radius: 10px;
      height: 500px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #dc2626;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: orange;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #score {
      margin-top: 10px;
      font-size: 20px;
      color: gold;
    }

    #rank {
      color: cyan;
    }

    #effect {
      margin-top: 10px;
      min-height: 36px;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 1px;
      transition: transform 0.2s ease, color 0.2s ease, text-shadow 0.2s ease;
    }

    .effect-pulse {
      animation: pulse 1.2s infinite;
    }

    .effect-shake {
      animation: shake 0.5s infinite;
    }

    .effect-flash {
      animation: flash 0.9s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔥 Rage Bait Battle 🔥</h1>

  <div id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your argument..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div id="score">
    Score: <span id="scoreValue">0</span>
    |
    Rank: <span id="rank">Beginner Menace</span>
  </div>

  <div id="effect"></div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  let score = 0;

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(sender);

    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function updateRank() {
    const rank = document.getElementById("rank");

    if (score < 10000) {
      rank.innerText = "Beginner Menace";
    } else if (score < 50000) {
      rank.innerText = "Certified Troll";
    } else if (score < 150000) {
      rank.innerText = "Keyboard Warrior";
    } else {
      rank.innerText = "Final Boss";
    }
  }

  function updateEffect() {
    const effect = document.getElementById("effect");
    effect.className = "";
    effect.style.color = "white";
    effect.style.textShadow = "none";

    if (score === 1000) {
      effect.innerText = "no effects";
    } else if (score >= 1001 && score <= 5000) {
      effect.innerText = "critical!";
      effect.classList.add("effect-pulse");
      effect.style.color = "#f59e0b";
      effect.style.textShadow = "0 0 12px #f59e0b";
    } else if (score >= 5001 && score <= 10000) {
      effect.innerText = "Unbelievable!!!";
      effect.classList.add("effect-pulse", "effect-flash");
      effect.style.color = "#22d3ee";
      effect.style.textShadow = "0 0 16px #22d3ee";
    } else if (score >= 10001 && score <= 30000) {
      effect.innerText = "EMOTIONAL DAMAGE!!!";
      effect.classList.add("effect-shake");
      effect.style.color = "#f97316";
      effect.style.textShadow = "0 0 16px #f97316";
    } else if (score >= 30001 && score <= 60000) {
      effect.innerText = "PRO FAILURE MANAGER";
      effect.classList.add("effect-pulse");
      effect.style.color = "#a78bfa";
      effect.style.textShadow = "0 0 16px #a78bfa";
    } else if (score >= 60001 && score <= 89999) {
      effect.innerText = "PRO RAGE-BAITER";
      effect.classList.add("effect-pulse", "effect-flash");
      effect.style.color = "red";
      effect.style.textShadow = "0 0 18px red";
    } else if (score >= 90000) {
      effect.innerText = "Undefeatable!!!";
      effect.classList.add("effect-pulse", "effect-flash");
      effect.style.color = "#fde047";
      effect.style.textShadow = "0 0 20px #fde047";
    } else {
      effect.innerText = "";
    }
  }

  async function sendMessage() {
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");

    input.value = "";

    addMessage("AI is typing...", "ai");

    try {
      const response = await fetch("./api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });
      
      const data = await response.json();

      chat.lastChild.remove();

      const aiReply = data.reply || "Imagine losing this hard 💀";
      const gained = Number(data.score) || 1000;

      score += gained;
      document.getElementById("scoreValue").innerText = score;
      updateRank();
      updateEffect();

      addMessage(aiReply, "ai");

    } catch (error) {
      chat.lastChild.remove();

      addMessage(
        "The AI rage quit because your argument was too terrible.",
        "ai"
      );

      console.error(error);
    }
  }

  input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });

  updateEffect();
</script>

</body>
</html>
