<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rage-bait Battle</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: orange;
    }

    #chat {
      background: #1b1b1b;
      border-radius: 10px;
      height: 500px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #dc2626;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: orange;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #score {
      margin-top: 10px;
      font-size: 20px;
      color: gold;
    }

    #rank {
      color: cyan;
    }

    #effect {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      width: min(90vw, 900px);
      font-size: clamp(44px, 9vw, 112px);
      font-weight: 900;
      text-align: center;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 0;
      z-index: 999;
      text-transform: uppercase;
      --shake-distance: 8px;
      --shake-duration: 480ms;
      --explode-duration: 1100ms;
      --screen-shake-distance: 0px;
      --screen-shake-duration: 0ms;
      --glow-color: #f59e0b;
      text-shadow: 0 0 30px var(--glow-color), 0 0 75px var(--glow-color);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(calc(-1 * var(--shake-distance))); }
      75% { transform: translateX(var(--shake-distance)); }
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
        filter: blur(4px);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.22);
        filter: blur(0);
      }
      70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.34);
      }
    }
  

    #fx-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 998;
      overflow: hidden;
    }

    .spark,
    .smoke {
      position: fixed;
      left: var(--x, 50%);
      top: var(--y, 50%);
      pointer-events: none;
      will-change: transform, opacity;
    }

    .spark {
      width: var(--size, 6px);
      height: var(--size, 6px);
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, var(--spark-color, #f59e0b) 55%, rgba(255,140,0,0) 100%);
      box-shadow: 0 0 14px var(--spark-color, #f59e0b);
      animation: sparkFly var(--life, 950ms) ease-out forwards;
    }

    .smoke {
      width: var(--w, 36px);
      height: var(--h, 26px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(212,212,212,0.52), rgba(120,120,120,0.3) 55%, rgba(32,32,32,0));
      filter: blur(2.4px);
      mix-blend-mode: screen;
      animation: smokeRise var(--life, 1600ms) ease-out forwards;
    }

    @keyframes sparkFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) translateX(0) scale(1.1);
      }
      75% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) translateX(var(--distance, 120px)) translateY(var(--drop, 26px)) scale(0.25);
      }
    }

    

    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(calc(-1 * var(--screen-shake-distance)), calc(-0.4 * var(--screen-shake-distance))); }
      30% { transform: translate(var(--screen-shake-distance), calc(0.6 * var(--screen-shake-distance))); }
      45% { transform: translate(calc(-0.8 * var(--screen-shake-distance)), var(--screen-shake-distance)); }
      60% { transform: translate(var(--screen-shake-distance), calc(-0.8 * var(--screen-shake-distance))); }
      75% { transform: translate(calc(-0.6 * var(--screen-shake-distance)), calc(0.8 * var(--screen-shake-distance))); }
      90% { transform: translate(calc(0.4 * var(--screen-shake-distance)), calc(-0.6 * var(--screen-shake-distance))); }
    }

    body.screen-shake {
      animation: screenShake var(--screen-shake-duration) linear 1;
    }

    @keyframes smokeRise {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(0) scale(0.7);
      }
      20% {
        opacity: 0.42;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(var(--rise, -120px)) translateX(var(--drift, 24px)) scale(1.65);
      }
    }

  </style>
</head>
<body>

<div class="container">
  <h1>🔥 Rage Bait Battle 🔥</h1>

  <div id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Type your argument..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div id="score">
    Score: <span id="scoreValue">0</span>
    |
    Rank: <span id="rank">Beginner Menace</span>
  </div>

  <div id="effect"></div>
  <div id="fx-layer"></div>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  let score = 0;
  let lastGained = 0;
  let screenShakeTimer = null;

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(sender);

    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function updateRank() {
    const rank = document.getElementById("rank");

    if (score < 10000) {
      rank.innerText = "Beginner Menace";
    } else if (score < 50000) {
      rank.innerText = "Certified Troll";
    } else if (score < 150000) {
      rank.innerText = "Keyboard Warrior";
    } else {
      rank.innerText = "Final Boss";
    }
  }

  function updateEffect(currentPoints) {
    const effect = document.getElementById("effect");
    effect.className = "";
    effect.style.color = "#fff";
    effect.style.setProperty("--screen-shake-distance", "0px");
    effect.style.setProperty("--screen-shake-duration", "0ms");

    const points = Number(currentPoints) || 0;
    const animations = ["explode var(--explode-duration) cubic-bezier(0.14, 0.86, 0.24, 1)"];

    if (points === 1000) {
      effect.innerText = "no effects";
      effect.style.setProperty("--glow-color", "#e5e7eb");
      effect.style.setProperty("--shake-distance", "6px");
      effect.style.setProperty("--shake-duration", "520ms");
    } else if (points >= 1001 && points <= 5000) {
      effect.innerText = "critical!";
      effect.style.color = "#f59e0b";
      effect.style.setProperty("--glow-color", "#f59e0b");
      effect.style.setProperty("--shake-distance", "8px");
      effect.style.setProperty("--shake-duration", "460ms");
      animations.push("pulse 0.75s ease-out 1");
      spawnBurstParticles({ sparks: 8, smoke: 4, color: "#f59e0b", intensity: 0.85 });
    } else if (points >= 5001 && points <= 10000) {
      effect.innerText = "Unbelievable!!!";
      effect.style.color = "#22d3ee";
      effect.style.setProperty("--glow-color", "#22d3ee");
      effect.style.setProperty("--shake-distance", "10px");
      effect.style.setProperty("--shake-duration", "420ms");
      animations.push("pulse 0.75s ease-out 1", "flash 0.8s ease-in-out 2");
      spawnBurstParticles({ sparks: 14, smoke: 7, color: "#22d3ee", intensity: 1 });
    } else if (points >= 10001 && points <= 30000) {
      effect.innerText = "EMOTIONAL DAMAGE!!!";
      effect.style.color = "#f97316";
      effect.style.setProperty("--glow-color", "#f97316");
      effect.style.setProperty("--shake-distance", "14px");
      effect.style.setProperty("--shake-duration", "350ms");
      animations.push("shake var(--shake-duration) ease-in-out 2");
      spawnBurstParticles({ sparks: 20, smoke: 11, color: "#f97316", intensity: 1.15 });
    } else if (points >= 30001 && points <= 60000) {
      effect.innerText = "PRO FAILURE MANAGER";
      effect.style.color = "#a78bfa";
      effect.style.setProperty("--glow-color", "#a78bfa");
      effect.style.setProperty("--shake-distance", "20px");
      effect.style.setProperty("--shake-duration", "300ms");
      animations.push("pulse 0.75s ease-out 1", "shake var(--shake-duration) ease-in-out 2");
      spawnBurstParticles({ sparks: 28, smoke: 15, color: "#a78bfa", intensity: 1.25 });
    } else if (points >= 60001 && points <= 89999) {
      effect.innerText = "PRO RAGE-BAITER";
      effect.style.color = "red";
      effect.style.setProperty("--glow-color", "red");
      effect.style.setProperty("--shake-distance", "26px");
      effect.style.setProperty("--shake-duration", "240ms");
      animations.push("pulse 0.75s ease-out 1", "shake var(--shake-duration) ease-in-out 2", "flash 0.8s ease-in-out 2");
      spawnBurstParticles({ sparks: 34, smoke: 18, color: "#ef4444", intensity: 1.35 });
    } else if (points >= 90000) {
      effect.innerText = "Undefeatable!!!";
      effect.style.color = "#fde047";
      effect.style.setProperty("--glow-color", "#fde047");
      effect.style.setProperty("--shake-distance", "52px");
      effect.style.setProperty("--shake-duration", "130ms");
      effect.style.setProperty("--screen-shake-distance", "18px");
      effect.style.setProperty("--screen-shake-duration", "720ms");
      animations.push("pulse 0.75s ease-out 1", "shake var(--shake-duration) ease-in-out 4", "flash 0.65s ease-in-out 3");
      spawnBurstParticles({ sparks: 90, smoke: 46, color: "#f97316", intensity: 2.4 });
      triggerScreenShake(effect);
    } else {
      effect.innerText = "";
    }

    void effect.offsetWidth;
    effect.style.animation = "none";
    void effect.offsetWidth;
    effect.style.animation = animations.join(", ");
  }


  const fxLayer = document.getElementById("fx-layer");

  function spawnBurstParticles({ sparks = 0, smoke = 0, color = "#f59e0b", intensity = 1 }) {
    const rect = document.getElementById("effect").getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    for (let i = 0; i < sparks; i++) {
      const spark = document.createElement("span");
      spark.className = "spark";
      const angle = Math.random() * 360;
      const distance = (90 + Math.random() * 180) * intensity;
      spark.style.setProperty("--x", `${centerX + (Math.random() - 0.5) * rect.width * 0.55}px`);
      spark.style.setProperty("--y", `${centerY + (Math.random() - 0.5) * rect.height * 0.35}px`);
      spark.style.setProperty("--rot", `${angle}deg`);
      spark.style.setProperty("--distance", `${distance}px`);
      spark.style.setProperty("--drop", `${20 + Math.random() * 34}px`);
      spark.style.setProperty("--size", `${3 + Math.random() * 6}px`);
      spark.style.setProperty("--spark-color", color);
      spark.style.setProperty("--life", `${600 + Math.random() * 650}ms`);
      fxLayer.appendChild(spark);
      spark.addEventListener("animationend", () => spark.remove(), { once: true });
    }

    for (let i = 0; i < smoke; i++) {
      const puff = document.createElement("span");
      puff.className = "smoke";
      puff.style.setProperty("--x", `${centerX + (Math.random() - 0.5) * rect.width * 0.7}px`);
      puff.style.setProperty("--y", `${centerY + (Math.random() - 0.5) * rect.height * 0.4}px`);
      puff.style.setProperty("--w", `${22 + Math.random() * 30}px`);
      puff.style.setProperty("--h", `${16 + Math.random() * 24}px`);
      puff.style.setProperty("--rise", `${-65 - Math.random() * 110}px`);
      puff.style.setProperty("--drift", `${(Math.random() - 0.5) * 70}px`);
      puff.style.setProperty("--life", `${1200 + Math.random() * 900}ms`);
      fxLayer.appendChild(puff);
      puff.addEventListener("animationend", () => puff.remove(), { once: true });
    }
  }


  function triggerScreenShake(effectEl) {
    const body = document.body;
    if (screenShakeTimer) {
      clearTimeout(screenShakeTimer);
      screenShakeTimer = null;
    }

    body.classList.remove("screen-shake");
    body.style.setProperty("--screen-shake-distance", effectEl.style.getPropertyValue("--screen-shake-distance") || "14px");
    body.style.setProperty("--screen-shake-duration", effectEl.style.getPropertyValue("--screen-shake-duration") || "640ms");
    void body.offsetWidth;
    body.classList.add("screen-shake");

    const duration = Number.parseInt((effectEl.style.getPropertyValue("--screen-shake-duration") || "640ms"), 10) || 640;
    screenShakeTimer = setTimeout(() => {
      body.classList.remove("screen-shake");
      screenShakeTimer = null;
    }, duration + 60);
  }


  async function sendMessage() {
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");

    input.value = "";

    addMessage("AI is typing...", "ai");

    try {
      const response = await fetch("./api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });
      
      const data = await response.json();

      chat.lastChild.remove();

      const aiReply = data.reply || "Imagine losing this hard 💀";
      const gained = Number(data.score) || 1000;

      lastGained = gained;
      score += gained;
      document.getElementById("scoreValue").innerText = score;
      updateRank();
      updateEffect(lastGained);

      addMessage(aiReply, "ai");

    } catch (error) {
      chat.lastChild.remove();

      addMessage(
        "The AI rage quit because your argument was too terrible.",
        "ai"
      );

      console.error(error);
    }
  }

  input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });

  updateEffect(score);
</script>

</body>
</html>
